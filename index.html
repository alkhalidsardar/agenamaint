<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maintenance</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0b0f;
      color: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 500px;
      padding: 30px;
      border: 1px solid #2a2a35;
      border-radius: 16px;
      background: #14141c;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      color: #cfcfd6;
      line-height: 1.6;
    }

    .small {
      margin-top: 20px;
      font-size: 14px;
      color: #8f8f9d;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Site Under Maintenance</h1>
    <p>
      AgendaMarket is currently under maintenance.we are working on some update and site errors.
      The site will be available again in a few hours.
    </p>
    <div class="small">Thank you for your patience.</div>
  </div>
</body>
</html>
